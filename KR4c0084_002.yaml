body:
  text: 省題詩天驥呈才馬知因聖出才本自天生駔駿何煩隱權竒願盡呈電從雙眼落雲向四蹄輕過去王良喜嘶來伯樂驚絶塵慙逸步曵練議能名唯待金鞭下春風紫陌青上德不德何從稱上德捨德德方全聖者如非聖賢人不自賢海寧言我廣神豈謂豫玄伐善功難立無為化易宣豈惟聞邃古理亦愧先天欲述猶龍旨應忘得意筌農祥晨正玉律方移候農祥已向晨昭回當午地皎潔向天津北陸收殘凍東臯見早春影浮佳氣動光射曙雲新千畝功將起三推禮欲申若非齊七政何以示農人詠白非青玄赤黃正色配金方魚表周王德麟呈漢帝祥寒來邊草逺春至嶺梅芳曵練聞良馬銜鈎見瑞狼張蒼肥似瓠潘嶽鬢如霜虛室能生後方知守黑長詠菊秋來多野菊節應皆黃花間葉玉如粟滿藂金出沙池邊迷瑞鵠洞裏悟仙牙蘂散非紅豔香飄異闕葩贈詩宜魏帝泛酒稱陶家明日登髙處期君酒不賖詠清潔徹浮天色鏘洋入樂聲露零金掌滿冰結玉壺盈屏障排雲母簾櫳動水精南山秋雨霽北牖晚風生裴楷當年意胡威近日名未知堯舜化寰宇一時清月前菊秋菊近重陽原頭復道旁藂滋寒露緑花綻晚風黃蘖染枝枝豔星分處處芳乍疑金散野遙誤葉經霜籬下何人採樽中滿座香唯應未歸客對此欲沾裳上已日曲江錫宴羣臣池散暮春景君垂晞露恩妙音回舜樂濃味降堯樽詔出傾蘭省筵開對杏園輕漣搖彩艦芳草映華軒禊事輝朝曲歡聲徹帝門常陪觀者列低首望餘暄甸服耆舊望藉千畝不展三推禮如今已幾年郊畿春又至父老頸空延扶杖溝塍側傾心日月邊歡欣情倍百流目地方千未覩公卿從長愁犬馬先幸同黃耉意因此願聞天曉日禁林聞清漏曉過宫垣側猶聞漏水頻清音傳五夜山影值三春露碎金壺滴風和玉佩振依稀連鳳沼倣佛辨雞人溫樹初凝霧彤闈漸向晨若非鵷鷺伴誰此繼香塵未明求衣夙夜寧無凖憂勤事萬幾良宵猶未曙深殿早求衣長樂鐘才動華胥夢已歸絲綸傳紫禁黼黻進彤闈被處燭仍在垂時星始稀豈惟漢文帝因此致巍巍寒雨滴空階霏霏飄永夜滴滴落寒階自有路岐恨那堪離别懷簷前聲乍碎枕畔夢全乖逺與巖泉雜微將漏水諧天涯思舊友江上憶間齋坐到空庭晚殘雲帶石崖山明松雪髙樹當軒曉長松帶雪明景疑殘月在林似野雲橫密葉緣多亞修條被壓傾曙空連嶂白寒氣到簷清影雜青牛重光迷皓鶴驚披衣凝望久無限剡溪情元日早朝史官開聖厯天子御層樓夀域南山色恩波東海流繞欄生杞梓當檻簇貔貅日月祥光近山河喜氣浮兆人瞻鳳扆萬里御皇猷欲識春生處雞竿最上頭原隰荑緑栁晴郊浮淑氣踈栁發柔荑嫩翠原頭遍輕絲隰畔低和煙方鬱鬱伴草欲萋萋葉少眉還短條新帶未齊離人心已醉逰客步初迷無限遷喬意芳菲正好棲風中琴虛簷來曉吹橫榻有瑶琴暗報青蘋葉潛生緑綺音數聲隨籟去餘響入堂深徽假大王按絃因少女吟如箏飄閣上似瑟鼓江潯若與鍾期會還知天地心文不加點娛賔初命賦摛翰已堪誇思發才無滯文成點不加筆端舒錦繡手下走龍蛇罷益銀鈎勢休添麗澤華誤蠅寧復見倚馬未為嘉自愧當明試含毫到日斜曲江春望暇日來南陌春晴望曲江地方駢綺席城過拂雲幢寶塔搖鈴鐸雲樓闢璅忩落風花片片掠水燕雙雙逰女紅銀碗王孫白玉缸莫論仙禁裏祗此見雄邦邊城曉角十年拋故國五夜在邊城月照沙千里風吹角一聲清音飄逺戍殘韻落荒營背雪征鴻報眠霜野馬行李陵應下淚蔡琰豈勝情直是胡兒聼涼飈到處生三峽聞猿扁舟登椘峽孤棹下巫雲正值三聲斷仍教五夜聞凄凄流洞壑杳杳透煙氛灔澦秋歸盡陽臺曙欲分何人悲失計幾度恨離羣聼後盈巾淚家山接海濵寒梧棲鳳本向髙岡植寧將衆木齊雖隨楊栁落長待鳳凰棲井上枝微亞忩前影乍低九苞和月立六律帶霜啼秦女含吹管周王罷翦圭既同丹穴樹那肯宿羣雞麟角集附録
